# Nombre descriptivo en la pestaña "Actions" de GitHub
name: Pipeline de CI/CD para Docker Hub

# Define los disparadores. 
on:
  push: # Aquí le indicamos que se active solo con un push
    branches: ["main"] #  En la rama main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Clonar el código en el servidor virtual de GitHub
          - name: Descargar el código del repositorio
            uses: actions/checkout@v4

      # 2. Iniciar sesión en Docker Hub de forma segura
          - name: Iniciar sesión en Docker Hub
            uses: docker/login-action@v3
            with:
              username: ${{ secrets.DOCKER_HUB_USERNAME }}
              password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. Construir la imagen y subirla automáticamente
          - name: Construir y subir la imagen de Docker
            uses: docker/build-push-action@v5
            with:
                context: .
                file: ./Dockerfile
                push: true
                tags: katyflorez/imagen_proyecto_cloud_ops:v2